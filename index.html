<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casa Campo — Enlaces y Contacto</title>
  <link rel="icon" type="image/png" href="https://img.icons8.com/android/24/barn.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400&family=Work+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#F5F0E5',
            bgalt: '#ECE4D1',
            ink: '#2B3328',
            inksoft: '#5C6653',
            green: '#5F7350',
            greendeep: '#37452F',
            greenpale: '#DEE5D2',
            wood: '#A68A63',
          },
          fontFamily: {
            display: ['Fraunces', 'serif'],
            sans: ['Work Sans', 'sans-serif'],
          },
          keyframes: {
            fadeUpIn: {
              '0%': { opacity: 0, transform: 'translateY(22px)' },
              '100%': { opacity: 1, transform: 'translateY(0)' },
            },
          },
          animation: {
            fadeUpIn: 'fadeUpIn .8s ease forwards',
          },
        },
      },
    };
  </script>

  <style>
    body {
      background: radial-gradient(circle at top, #ECE4D1 0%, #F5F0E5 100%);
    }
  </style>
</head>

<body class="text-ink font-sans leading-relaxed antialiased overflow-x-hidden min-h-screen flex flex-col justify-between py-10 px-4">

  <!-- Contenedor Principal -->
  <main class="max-w-[480px] w-full mx-auto flex flex-col items-center text-center my-auto load-in animate-fadeUpIn">
    
    <!-- Imagen de Perfil / Logo del Salón -->
    <div class="relative w-28 h-28 rounded-full overflow-hidden border-4 border-white shadow-lg mb-6 group transition-transform hover:scale-105 duration-300">
      <img src="img/primera-foto.jfif" alt="Casa Campo" class="w-full h-full object-cover">
    </div>

    <!-- Título y Ubicación -->
    <h1 class="font-display font-medium text-[36px] tracking-tight leading-none mb-2">
      Casa<em class="text-green font-normal">Campo</em>
    </h1>
    <p class="text-[13px] font-medium tracking-[0.08em] uppercase text-inksoft mb-8 flex items-center justify-center gap-1.5">
      <svg class="w-4 h-4 text-green" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 21s-7-7.5-7-12a7 7 0 0114 0c0 4.5-7 12-7 12z" />
        <circle cx="12" cy="9" r="2.5" />
      </svg>
      Médano de Oro, San Juan
    </p>

    <!-- Listado de Enlaces (Botones) -->
    <div class="w-full flex flex-col gap-5 mb-10">
      
      <!-- Botón: Conocer la Web -->
      <a href="pagina.html" 
         class="w-full flex items-center justify-between px-7 py-5.5 rounded-full bg-greendeep text-bg font-medium text-[16.5px] sm:text-[17px] shadow-md hover:bg-green hover:-translate-y-1 active:translate-y-0 transition-all duration-300 group">
        <span class="flex items-center gap-3.5">
          <svg class="w-6 h-6 opacity-95" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
            <path d="M2 12h20"/>
          </svg>
          Ver Sitio Web Completo
        </span>
        <svg class="w-6 h-6 opacity-70 group-hover:translate-x-1.5 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
        </svg>
      </a>

      <!-- Botón: WhatsApp -->
      <a href="https://wa.me/5492644464195?text=Hola%2C%20quisiera%20consultar%20fechas%20disponibles%20en%20Casa%20Campo" 
         target="_blank" rel="noopener"
         class="w-full flex items-center justify-between px-7 py-5.5 rounded-full bg-white border border-ink/10 text-ink font-medium text-[16.5px] sm:text-[17px] shadow-md hover:border-green hover:text-green hover:-translate-y-1 active:translate-y-0 transition-all duration-300 group">
        <span class="flex items-center gap-3.5">
          <!-- Icono de WhatsApp SVG -->
          <svg class="w-6 h-6 text-[#25D366]" fill="currentColor" viewBox="0 0 24 24">
            <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.514 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.724-1.457L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.825 1.451 5.436 0 9.86-4.37 9.864-9.799.002-2.63-1.023-5.101-2.885-6.963C16.588 2.02 14.116.999 11.987 1c-5.443 0-9.87 4.372-9.874 9.802-.001 1.73.473 3.41 1.37 4.915l-.994 3.634 3.734-.97-.166-.277z"/>
          </svg>
          Consultar por WhatsApp
        </span>
        <svg class="w-6 h-6 opacity-50 group-hover:translate-x-1.5 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
        </svg>
      </a>

      <!-- Botón: Facebook -->
      <a href="https://www.facebook.com/casa.campo.322395/" 
         target="_blank" rel="noopener"
         class="w-full flex items-center justify-between px-7 py-5.5 rounded-full bg-white border border-ink/10 text-ink font-medium text-[16.5px] sm:text-[17px] shadow-md hover:border-blue-600 hover:text-blue-600 hover:-translate-y-1 active:translate-y-0 transition-all duration-300 group">
        <span class="flex items-center gap-3.5">
          <!-- Icono de Facebook SVG -->
          <svg class="w-6 h-6 text-[#1877F2]" fill="currentColor" viewBox="0 0 24 24">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
          Seguinos en Facebook
        </span>
        <svg class="w-6 h-6 opacity-50 group-hover:translate-x-1.5 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
        </svg>
      </a>

    </div>

  </main>

  <!-- Footer -->
  <footer class="text-center text-[12.5px] text-inksoft max-w-[360px] mx-auto">
    <p>© 2026 Casa Campo. Todos los derechos reservados.</p>
    <p class="mt-1">Médano de Oro, San Juan, Argentina</p>
  </footer>

</body>

</html>
